name: Daily ML Digest

on:
  schedule:
    - cron: '0 16 * * *'   # 8am PST (UTC-8). adjust if needed:
                            # 9am PST  → '0 17 * * *'
                            # 7am PST  → '0 15 * * *'
                            # use crontab.guru to calculate your timezone
  workflow_dispatch:        # run manually anytime from the Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          MOM_EMAIL_TO:       ${{ secrets.MOM_EMAIL_TO }}
        run: python3 digest.py && python3 mom_digest.py
